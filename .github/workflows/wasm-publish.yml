# V1.14 Scope E — `@atlas-trust/verify-wasm` npm publish lane.
#
# Builds `crates/atlas-verify-wasm` via `wasm-pack` for both browser
# (`--target web`) and Node.js (`--target nodejs`) consumers, applies
# the npm scope, and publishes to npm. The published artefact is the
# byte-identical Rust verifier core (atlas-trust-core) compiled to
# wasm32-unknown-unknown — same trust property as the native CLI, no
# new attack surface, just a different distribution channel.
#
# Trigger surface — explicit + auditable:
#
#   * `workflow_dispatch` — manual run for either (a) build-pipeline
#     dry-run verification on a branch before tagging (default
#     `dry_run: true`), or (b) operator-explicit re-fire on an
#     already-signed tag if the original tag-push publish was skipped
#     (V1.19 Welle 14a — fired with `--ref vX.Y.Z -f dry_run=false`).
#     V1.17 Welle B made dispatch publish-incapable for the branch
#     case; V1.19 Welle 14a re-enables it strictly for the
#     dispatch-from-tag case — the signed-tag check (first step) and
#     the publish gate (further down) both require a tag ref, so
#     dispatch from a branch still cannot publish. See those steps'
#     `if:` clauses for the precise conditions.
#   * `push: tags: ['v*']` — automated publish on signed-tag push.
#     The tag name MUST match a release tag (`v1.14.0`, `v1.14.1`, …)
#     AND the tag MUST be cryptographically signed by an SSH key in
#     `.github/allowed_signers` (V1.17 Welle B — first step of this
#     job verifies). Unsigned-tag push fails the publish lane
#     closed BEFORE any build step runs.
#
# Why a separate workflow file (rather than a job in CI):
#   * It uses a different secret (`NPM_TOKEN`) than the HSM lanes.
#   * It runs on a different trigger (tag push, not PR).
#   * Failure surface is publish-only — a build regression must NOT
#     block PR merges, only the next release.
#
# Defence-in-depth: the publish step is gated on `NPM_TOKEN` being
# present. Forks that run this workflow on their own PRs (e.g. via
# `workflow_dispatch`) have no `NPM_TOKEN` available and the publish
# step is skipped — they can still validate the build pipeline
# end-to-end without any path to leak credentials.
#
# Backwards-compat note: the npm package is a NEW publishing channel,
# not a replacement for the native CLI. Existing verifier consumers
# (atlas-verify-cli, atlas-mcp-server smoke, in-repo tests) continue
# to use the Rust workspace directly. No CI lane other than this one
# depends on the npm registry.

name: wasm-publish

on:
  # Manual trigger for ad-hoc publish + dry-run verification.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, build only — skip the npm publish step.'
        type: boolean
        default: true
  # Tag-triggered release publish.
  push:
    tags:
      - 'v*'

permissions:
  # `contents: write` is needed by the `Upload tarballs to GitHub Release`
  # step (V1.15 Welle B backup distribution channel) to attach release
  # assets via the gh CLI on tag pushes. Without this, the GH-Release
  # path falls back silently and the only distribution channel remains
  # npmjs.org — defeating the resilience goal.
  #
  # `id-token: write` is needed by `npm publish --provenance` to mint an
  # OIDC token for SLSA L3 attestations. GitHub Actions evaluates
  # `permissions:` only at workflow or job scope; a `permissions:` key
  # nested under a step is not a recognised YAML field and is silently
  # dropped (the V1.14 Scope E original step-level placement was a
  # latent bug, not a working narrow-scoping mechanism — narrowing IS
  # supported at job level by overriding workflow defaults). The OIDC
  # grant must therefore be at workflow or job level. Granting at
  # workflow level here is the smallest change that makes provenance
  # attestations actually fire on tag pushes; a future Welle could
  # split into a build-and-publish job (id-token: write, contents: read)
  # plus a release-upload job (contents: write, id-token: none) to
  # eliminate the OIDC + write-content co-location.
  #
  # The expanded scope only takes effect within this single-job workflow,
  # which fires only on `workflow_dispatch` or `push: tags: ['v*']` —
  # both gated by branch / tag protection rules in repo settings.
  contents: write
  id-token: write

# V1.19 Welle 14a: serialize runs against the same ref so a second
# workflow_dispatch fire (e.g. operator clicks "Run workflow" twice
# quickly) can't race the first into a confusing npm 409. Two
# simultaneous publishes for the same version are npm-side blocked
# anyway, but the queue surfaces a clean "queued" status instead of
# a red second run. cancel-in-progress: false because cancelling mid-
# publish would leave the package in an unknown state (e.g. pkg-web
# published but pkg-node not, or post-publish verification missed).
concurrency:
  group: wasm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      # Pinned wasm-pack version — bumping requires a human-reviewed
      # PR. wasm-pack's bundled wasm-opt is a known footgun (see the
      # `[package.metadata.wasm-pack.profile.release].wasm-opt = false`
      # in atlas-verify-wasm's Cargo.toml); pinning the toolchain
      # version protects against silent behaviour changes.
      WASM_PACK_VERSION: '0.13.1'
      NPM_PACKAGE_SCOPE: '@atlas-trust'
      NPM_PACKAGE_NAME: 'verify-wasm'

    steps:
      # All `uses:` pinned to immutable SHAs — same rationale as the
      # V1.12 / V1.14 HSM lanes. Bumping requires a human-reviewed PR.
      #
      # `fetch-depth: 0` + `fetch-tags: true` are required so the
      # tag-signature verification step (next) can resolve the tag
      # object and walk the commit history — the default shallow clone
      # has neither. The cost is ~1–2 s of additional clone time on
      # the average runner, well below the noise floor of the wasm-pack
      # cold cache (~2–4 min), so the trade is unconditionally worth it.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      # actions/checkout@v4 with `fetch-tags: true` can leave annotated
      # tag OBJECTS missing under partial-clone/filter modes — only the
      # tag REF is fetched, pointing directly at the target commit
      # (lightweight). `git verify-tag` then refuses to verify the
      # non-tag object, breaking the V1.17 Welle B gate even on a
      # legitimately-signed tag. This was caught on the v1.17.0 first
      # tag-cut (run 25394785761). Force-refetching tags after checkout
      # repopulates the annotated objects so verification sees the
      # signed tag, not the dereferenced commit.
      #
      # Unconditional on purpose. An earlier draft gated this on the
      # same `push + refs/tags/v*` predicate as the verify-tag step
      # below, which created a latent fragility: if a future trigger
      # change adds a new path that needs the verify-tag gate (e.g.
      # `repository_dispatch` for a re-publish from a hot-fix tag), a
      # maintainer could update the verify-tag step's `if:` and silently
      # leave the refetch step skipped — re-introducing the exact bug
      # this fix repairs. Cost of unconditional fetch: ~1 s on a
      # workflow-dispatch run with no tag activity. Benefit: the
      # invariant "verify-tag never runs without its required preamble"
      # holds regardless of future trigger surface evolution.
      # V1.19 Welle 14a (post-merge fixup): debug-print the GitHub
      # context values the downstream `if:` expressions evaluate.
      # Surfaces github.ref, github.ref_name, github.ref_type, and
      # inputs.dry_run so a later failure (skipped step) can be
      # traced to the actual context values without adding ad-hoc
      # debug steps each time. Permanent; runtime cost is negligible.
      - name: Print ref context (V1.19 Welle 14a diagnostic)
        run: |
          echo "github.event_name = ${{ github.event_name }}"
          echo "github.ref = ${{ github.ref }}"
          echo "github.ref_name = ${{ github.ref_name }}"
          echo "github.ref_type = ${{ github.ref_type }}"
          echo "github.sha = ${{ github.sha }}"
          echo "inputs.dry_run = ${{ inputs.dry_run }}"

      - name: Refetch annotated tag objects
        run: git fetch --tags --force origin

      # V1.17 Welle B — Tag-Signing Enforcement.
      #
      # FIRST gate: refuse to build / publish if the just-pushed tag is
      # not cryptographically signed by an SSH key listed in
      # `.github/allowed_signers`. This is the defence against a
      # repo-takeover / compromised-PAT attacker who pushes a `v*` tag
      # pointing at a smuggled commit — the whole publish lane fails
      # closed before any `npm publish` or GH-Release upload step ever
      # runs.
      #
      # `workflow_dispatch` runs from `master` (no tag push) skip this
      # step entirely — there's no tag to verify, and the publish gate
      # at the end already restricts dispatch publishes to the master
      # branch with `dry_run=false`. The tag-signature gate is
      # specifically for the tag-push trigger.
      #
      # See `.github/workflows/verify-tag-signatures.yml` for the
      # standalone verification surface (push/cron/dispatch over all
      # historical v* tags), and `docs/SECURITY-NOTES.md scope-l` for
      # the threat model.
      - name: Verify tag signature (V1.17 Welle B)
        id: verify-tag
        # V1.19 Welle 14a: also run on workflow_dispatch when the dispatched
        # ref is a tag (e.g. `gh workflow run wasm-publish.yml --ref v1.0.0
        # -f dry_run=false`). This keeps the V1.17 Welle B trust posture
        # intact — the signed-tag check still gates the publish — while
        # allowing operator-explicit re-fire on an already-signed tag if
        # the original tag-push publish was skipped (e.g. NPM_TOKEN not yet
        # configured at first push). Dispatch on a branch ref (no tag)
        # still skips this step and falls into the dry-run / no-publish
        # path because the publish-gate further down requires a tag ref.
        #
        # V1.19 Welle 14a post-merge fixup: switched from `startsWith(github.ref,
        # 'refs/tags/v')` to `github.ref_type == 'tag'`. The former was unreliable
        # for workflow_dispatch — `github.ref` evaluation on dispatch returned
        # values that didn't match the prefix even when --ref pointed at a tag,
        # causing both Verify-tag and Publish-to-npm to skip. `github.ref_type`
        # is the canonical context field for this discriminator per GA docs.
        if: (github.event_name == 'push' && github.ref_type == 'tag') || (github.event_name == 'workflow_dispatch' && github.ref_type == 'tag')
        # `unset ATLAS_ALLOWED_SIGNERS` is belt-and-suspenders against
        # a future workflow edit (or a compromised dependency action)
        # that writes to $GITHUB_ENV to redirect the trust root. The
        # script itself also rejects ATLAS_ALLOWED_SIGNERS in CI when
        # it doesn't resolve to the in-repo file (defence-in-depth).
        run: |
          set -euo pipefail
          unset ATLAS_ALLOWED_SIGNERS
          bash tools/verify-tag-signatures.sh "${GITHUB_REF_NAME}"
          # Capture the verified commit SHA — every later step that
          # references the tag (npm publish takes its bytes from the
          # checked-out tree, but `gh release create` resolves the tag
          # at upload time, which is a TOCTOU window if the tag is
          # force-pushed mid-run) pins to this SHA explicitly via
          # `--target`. `git rev-parse <tag>^{}` dereferences an
          # annotated tag to its target commit (a plain `rev-parse <tag>`
          # would yield the tag-object SHA, which is not what
          # `gh release create --target` accepts).
          VERIFIED_SHA="$(git rev-parse "${GITHUB_REF_NAME}^{}")"
          echo "verified_sha=${VERIFIED_SHA}" >> "${GITHUB_OUTPUT}"
          echo "Verified ${GITHUB_REF_NAME} → commit ${VERIFIED_SHA}"

      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.1
        with:
          workspaces: '. -> target'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          # Configure npm registry so the publish step can authenticate.
          # The token itself is sourced from `secrets.NPM_TOKEN` below
          # — `setup-node` only writes the registry URL.
          registry-url: 'https://registry.npmjs.org'

      # Install wasm-pack from crates.io rather than via the upstream
      # `init.sh` shell installer. The shell installer would fetch a
      # prebuilt binary over HTTPS from rustwasm.github.io, which is
      # protected only by TLS — a CDN compromise or a hijacked GitHub
      # Pages deploy could substitute a malicious binary that the
      # workflow would then execute with access to `NPM_TOKEN`.
      # `cargo install --locked` rebuilds wasm-pack from registry
      # source with its committed `Cargo.lock`, so the artefact is
      # reproducible from auditable inputs and benefits from the
      # Swatinem/rust-cache layer above. Slower first run (~2–4 min on
      # cold cache) is the cost — acceptable for a release lane.
      - name: Install pinned wasm-pack (from crates.io, --locked)
        run: |
          cargo install wasm-pack --version "${WASM_PACK_VERSION}" --locked
          wasm-pack --version

      # Build for browser (ESM, importable via <script type="module">).
      - name: wasm-pack build (target web)
        run: |
          wasm-pack build crates/atlas-verify-wasm \
            --target web \
            --release \
            --out-dir pkg-web

      # Build for Node.js (CommonJS, importable via require / dynamic
      # import in modern Node). The same Rust source, different
      # JS-side glue — wasm-pack handles the divergence.
      - name: wasm-pack build (target nodejs)
        run: |
          wasm-pack build crates/atlas-verify-wasm \
            --target nodejs \
            --release \
            --out-dir pkg-node

      # Apply the npm scope to both build outputs. We do this
      # post-build (rather than via wasm-pack's `--scope` flag)
      # because the plan in `.handoff/v1.14-handoff.md` §3 specifies
      # `@atlas-trust/verify-wasm` (no `atlas-` prefix) and
      # `wasm-pack --scope` would give `@atlas-trust/atlas-verify-wasm`.
      # `npm pkg set` is built-in and atomic at the JSON level.
      - name: Apply npm scope + publishConfig
        run: |
          set -eu
          for dir in crates/atlas-verify-wasm/pkg-web crates/atlas-verify-wasm/pkg-node; do
            cd "${dir}"
            npm pkg set name="${NPM_PACKAGE_SCOPE}/${NPM_PACKAGE_NAME}"
            npm pkg set publishConfig.access="public"
            cd "${GITHUB_WORKSPACE}"
          done

      # Smoke: the published artefact must successfully `require`
      # from a clean Node.js process AND verify the canonical bank
      # demo trace + bundle end-to-end. This catches a class of
      # wasm-bindgen / serde-wasm-bindgen regressions that a Rust-side
      # `wasm-bindgen-test` would also catch but at a different layer
      # — this one validates the published-artefact view.
      #
      # Asserts:
      #   * `verifier_version()` exports and returns a non-empty string.
      #   * `verify_trace_json(trace, bundle)` returns an object whose
      #     `valid` is true (matches the native CLI's output for the
      #     same input — pinned by `crates/atlas-trust-core/tests`).
      #   * `outcome.witness_failures` is an array (V1.14 Scope J wire
      #     surface — JS consumers must see the field via
      #     serde-wasm-bindgen marshalling, not just on the Rust side).
      - name: Node.js smoke (target nodejs)
        run: |
          set -eu
          cd crates/atlas-verify-wasm/pkg-node
          node -e "
            const fs = require('fs');
            const path = require('path');
            const m = require('./atlas_verify_wasm.js');

            if (typeof m.verifier_version !== 'function') {
              throw new Error('verifier_version not exported');
            }
            const v = m.verifier_version();
            if (typeof v !== 'string' || v.length === 0) {
              throw new Error('verifier_version returned non-string or empty');
            }
            console.log('verifier_version:', v);

            if (typeof m.verify_trace_json !== 'function') {
              throw new Error('verify_trace_json not exported');
            }
            const root = process.env.GITHUB_WORKSPACE;
            const trace = fs.readFileSync(
              path.join(root, 'examples/golden-traces/bank-q1-2026.trace.json'),
              'utf8',
            );
            const bundle = fs.readFileSync(
              path.join(root, 'examples/golden-traces/bank-q1-2026.pubkey-bundle.json'),
              'utf8',
            );
            const outcome = m.verify_trace_json(trace, bundle);
            if (outcome.valid !== true) {
              throw new Error('outcome.valid != true: ' + JSON.stringify(outcome));
            }
            if (!Array.isArray(outcome.witness_failures)) {
              throw new Error('outcome.witness_failures not an array: ' + JSON.stringify(outcome.witness_failures));
            }
            console.log('verify_trace_json: VALID, witness_failures=[' + outcome.witness_failures.length + ']');
          "

      # Smoke the WEB target via Node.js by feeding the WASM bytes
      # directly into the ESM glue's `init({ module_or_path })` path.
      # The web target uses `fetch()` for its default WASM loader,
      # which is unavailable in bare Node.js — but wasm-bindgen's
      # generated init function accepts a `BufferSource`, which lets
      # us drive the same JS glue from Node's filesystem. Without
      # this, the pkg-web tarball would ship to npm without a single
      # executed assertion through its ESM serde-wasm-bindgen layer
      # (the pkg-node smoke only covers the CommonJS glue — the two
      # diverge at the JS-side init + binding code).
      - name: Node.js smoke (target web — via direct WASM bytes)
        run: |
          set -eu
          cd crates/atlas-verify-wasm/pkg-web
          # Use top-level await via .mjs so we can `import()` the ESM
          # glue and drive its default-export init function with the
          # raw .wasm bytes (fetch() is not available here).
          node --input-type=module -e "
            import { readFileSync } from 'fs';
            import { join } from 'path';
            const mod = await import('./atlas_verify_wasm.js');
            const wasmBytes = readFileSync('./atlas_verify_wasm_bg.wasm');
            await mod.default({ module_or_path: wasmBytes });

            if (typeof mod.verifier_version !== 'function') {
              throw new Error('verifier_version not exported (web)');
            }
            const v = mod.verifier_version();
            if (typeof v !== 'string' || v.length === 0) {
              throw new Error('verifier_version returned non-string (web)');
            }
            console.log('verifier_version (web):', v);

            const root = process.env.GITHUB_WORKSPACE;
            const trace = readFileSync(
              join(root, 'examples/golden-traces/bank-q1-2026.trace.json'),
              'utf8',
            );
            const bundle = readFileSync(
              join(root, 'examples/golden-traces/bank-q1-2026.pubkey-bundle.json'),
              'utf8',
            );
            const outcome = mod.verify_trace_json(trace, bundle);
            if (outcome.valid !== true) {
              throw new Error('outcome.valid != true (web): ' + JSON.stringify(outcome));
            }
            if (!Array.isArray(outcome.witness_failures)) {
              throw new Error('outcome.witness_failures not an array (web)');
            }
            console.log('verify_trace_json (web): VALID, witness_failures=[' + outcome.witness_failures.length + ']');
          "

      # Pack-only: publish artefact tarballs as workflow artifacts so
      # an auditor can fetch the exact bytes that would have shipped
      # to npm, without needing access to the registry. Useful for
      # dry-run inspections.
      - name: Pack tarballs (artifacts)
        run: |
          set -eu
          cd crates/atlas-verify-wasm/pkg-web && npm pack && cd "${GITHUB_WORKSPACE}"
          cd crates/atlas-verify-wasm/pkg-node && npm pack && cd "${GITHUB_WORKSPACE}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wasm-publish-tarballs
          path: |
            crates/atlas-verify-wasm/pkg-web/*.tgz
            crates/atlas-verify-wasm/pkg-node/*.tgz
          retention-days: 14

      # Publish gate — defence-in-depth across four independent
      # checks, all of which must pass for an `npm publish` to fire:
      #
      #   1. The trigger is EITHER:
      #      (a) a `push` from a `refs/tags/v*` tag — the canonical
      #          release publish path; or
      #      (b) a `workflow_dispatch` with `dry_run=false` AND the
      #          dispatched ref is a `refs/tags/v*` tag (V1.19 Welle 14a).
      #          This is the operator-explicit re-fire path for cases
      #          where the original tag-push publish was skipped (e.g.
      #          NPM_TOKEN not configured at first push, transient npm
      #          registry error). Dispatch on a branch ref (no tag) is
      #          NOT a publish path — the publish step's `if:` requires
      #          a tag ref. This preserves V1.17 Welle B's trust posture:
      #          a maintainer / compromised PAT with `actions: write`
      #          still cannot publish from master, only from a signed
      #          tag — and the first-step `Verify tag signature` gate
      #          (now also running on dispatch-from-tag) authenticates
      #          the tag BEFORE this publish step runs.
      #   2. `NPM_TOKEN` is present (fork PRs and unauthorised manual
      #      runs have no token and skip cleanly with exit 0).
      #   3. The job-level `id-token: write` permission is granted
      #      (defaults to off via the workflow-level
      #      `permissions: contents: read`), enabling OIDC-signed
      #      provenance via `npm publish --provenance`.
      #   4. On the dispatch path only: `!inputs.dry_run` must be true
      #      (i.e. operator explicitly set `dry_run: false` in the
      #      workflow_dispatch form). Tag-push doesn't populate
      #      `inputs.*` at all, but the `||` structure means the
      #      `!inputs.dry_run` sub-expression is only evaluated on the
      #      dispatch arm — short-circuit on the push arm bypasses it
      #      entirely. So the gate admits both (push,tag) AND
      #      (dispatch,tag,!dry_run) without `inputs.*` ever being read
      #      on the push path.
      #
      # On the `push` path, the `on:` trigger already restricts to
      # `tags: ['v*']`, so `github.ref` is guaranteed to start with
      # `refs/tags/v` — the explicit `startsWith` here is a redundant
      # check that still fires correctly if someone later relaxes the
      # `on:` filter. The first-step `tools/verify-tag-signatures.sh`
      # (V1.17 Welle B) gate guarantees the tag is signed by an
      # `.github/allowed_signers` key BEFORE this publish step runs —
      # this holds for both tag-push and dispatch-from-tag paths
      # (V1.19 Welle 14a extended the verify-tag step's `if:`).
      #
      # The publish targets BOTH the web and node builds under the
      # same package name. The web build is the canonical default
      # tag (browser is the primary distribution channel for
      # in-browser auditor tooling); the node target ships under
      # the `node` dist-tag, available via
      # `npm install @atlas-trust/verify-wasm@node`. A future
      # iteration may merge both into a single package with
      # conditional exports — out of scope for V1.14.
      - name: Publish to npm
        id: publish
        # V1.19 Welle 14a post-merge fixup: switched from `startsWith(github.ref,
        # 'refs/tags/v')` to `github.ref_type == 'tag'`. See `Verify tag signature`
        # step comment for the diagnostic background.
        if: (github.event_name == 'push' && github.ref_type == 'tag') || (github.event_name == 'workflow_dispatch' && github.ref_type == 'tag' && !inputs.dry_run)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret not set — skipping publish."
            echo "did_publish=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          # `--provenance` (npm >=9.5) attaches an OIDC-signed
          # attestation linking this tarball to the GitHub Actions
          # run + repo + commit SHA. Downstream consumers can verify
          # via `npm audit signatures` or by inspecting the package
          # provenance on the npm registry. This is the single most
          # important supply-chain signal for `@atlas-trust/verify-wasm`.
          # The `id-token: write` permission required for the OIDC
          # token mint is granted at workflow level — see the
          # `permissions:` block at the top of this file.
          cd crates/atlas-verify-wasm/pkg-web
          npm publish --access public --provenance
          cd "${GITHUB_WORKSPACE}"
          cd crates/atlas-verify-wasm/pkg-node
          npm publish --access public --provenance --tag node
          echo "did_publish=true" >> "${GITHUB_OUTPUT}"

      # V1.19 Welle 14a — post-publish assertion (security-reviewer F-4 closing).
      #
      # The publish step exits 0 on missing NPM_TOKEN (silent skip — the
      # V1.17 Welle B defence-in-depth design). Without this assertion,
      # a release could be marked "shipped" while the npm package is
      # absent. This step verifies the published version actually
      # propagated to the npm registry. Skips if the publish step
      # itself skipped (NPM_TOKEN missing).
      #
      # `npm view` queries the registry directly (not the local cache);
      # a brief sleep absorbs registry replication latency. If the
      # version doesn't match what we just published, the workflow
      # fails red and the release-shipped signal is correctly negative.
      - name: Verify npm publish landed (V1.19 Welle 14a)
        if: steps.publish.outputs.did_publish == 'true'
        run: |
          set -euo pipefail
          # Derive expected version from the BUILT artifact, not from
          # the monorepo root package.json. `wasm-pack build` writes
          # `pkg-{web,node}/package.json` with the version derived from
          # the Cargo manifest — that IS the version that was published.
          # Reading it from the artifact eliminates any drift between
          # workspace-root package.json (npm tooling manifest, private,
          # never published) and the Cargo workspace version (the
          # canonical source of the published version). Per Welle 14a
          # review HIGH-1 / Q5b.
          EXPECTED_VERSION="$(node -p "require('./crates/atlas-verify-wasm/pkg-node/package.json').version")"
          PACKAGE_NAME="${NPM_PACKAGE_SCOPE}/${NPM_PACKAGE_NAME}"
          echo "Verifying ${PACKAGE_NAME}@${EXPECTED_VERSION} on npm registry..."
          # Allow up to ~60s for npm registry replication. Most publishes
          # propagate within 5-10s; allow margin for edge cases.
          # Loop structure: break on success, fall through to post-loop
          # check on exhaustion. Avoids brittle sentinel-equality check
          # that would silently disappear if MAX_ATTEMPTS were edited
          # without updating the sentinel. Per Welle 14a review HIGH-2.
          MAX_ATTEMPTS=6
          ATTEMPT_DELAY=10
          ACTUAL_VERSION=""
          for i in $(seq 1 "${MAX_ATTEMPTS}"); do
            sleep "${ATTEMPT_DELAY}"
            ACTUAL_VERSION="$(npm view "${PACKAGE_NAME}" version --silent 2>/dev/null || echo "")"
            if [ "${ACTUAL_VERSION}" = "${EXPECTED_VERSION}" ]; then
              echo "✓ ${PACKAGE_NAME}@${EXPECTED_VERSION} visible on registry (attempt ${i}/${MAX_ATTEMPTS})"
              break
            fi
            echo "Attempt ${i}/${MAX_ATTEMPTS}: registry returned '${ACTUAL_VERSION}', expected '${EXPECTED_VERSION}' — waiting ${ATTEMPT_DELAY}s..."
          done
          if [ "${ACTUAL_VERSION}" != "${EXPECTED_VERSION}" ]; then
            echo "::error::npm publish (latest dist-tag) did not propagate within $((MAX_ATTEMPTS * ATTEMPT_DELAY))s. Expected '${EXPECTED_VERSION}', got '${ACTUAL_VERSION}'"
            exit 1
          fi
          # Also assert package metadata is well-formed. `npm view`
          # surfaces `dist.signatures` (npm's automation-token signing) but
          # SLSA provenance is in `_attestations` on the registry side —
          # accessible via the audit signatures endpoint. We don't fail
          # closed on provenance-missing here because the SLSA L3 signal
          # is verified by downstream consumers via `npm audit signatures`,
          # not produced by us. `dist.tarball` existence is the sanity
          # check that the package metadata landed correctly.
          npm view "${PACKAGE_NAME}@${EXPECTED_VERSION}" dist.tarball --silent
          # The publish step publishes TWO packages: pkg-web at the
          # default `latest` dist-tag and pkg-node at the `node` dist-tag.
          # The version-loop above only checks `latest`. Verify the
          # `node` dist-tag also resolves to the same version (post-
          # publish-step partial-success guard). Per Welle 14a review
          # MEDIUM (CR #6).
          NODE_TAG_VERSION="$(npm view "${PACKAGE_NAME}@node" version --silent 2>/dev/null || echo "")"
          if [ "${NODE_TAG_VERSION}" != "${EXPECTED_VERSION}" ]; then
            echo "::error::npm 'node' dist-tag mismatch. Expected '${EXPECTED_VERSION}', got '${NODE_TAG_VERSION}'"
            exit 1
          fi
          echo "✓ ${PACKAGE_NAME}@node dist-tag → ${NODE_TAG_VERSION}"
          echo "✓ npm publish verification complete (latest + node dist-tags)"

      # V1.15 Welle B — Backup distribution channel via GitHub Releases.
      #
      # In addition to publishing to npmjs.org, on tag push we attach
      # the byte-identical `npm pack` output to the GitHub Release for
      # the same tag. Auditor recovery path: if npmjs.org is unreachable
      # (outage, account compromise, registry-side tamper), download
      # the tarball from GitHub Releases and `npm install ./local.tgz`.
      # Same SLSA L3 provenance applies — the npm-side attestation is
      # signed against the tarball SHA256 + commit SHA, both of which
      # the auditor can re-derive from the GH-Release tarball plus the
      # `tarball-sha256.txt` manifest also uploaded here.
      #
      # Why GitHub Releases (not GitHub Packages):
      #
      #   * GitHub Packages requires the npm scope to match the GitHub
      #     repo owner. The `@atlas-trust` scope and current owner
      #     (`ThePyth0nKid`) don't match, so a Packages-side mirror
      #     would force a `@thepyth0nkid/verify-wasm` rename and a
      #     consumer-side `.npmrc` change — friction in a recovery
      #     moment. GH Releases serves identical bytes with no
      #     rename or auth requirement.
      #   * GH Releases assets are publicly readable for public repos;
      #     no token, no scope rename, no `.npmrc` mutation. The
      #     consumer flow is `curl + npm install ./tarball.tgz`,
      #     which an auditor can perform offline / behind a corporate
      #     proxy / from any machine.
      #
      # Rename rationale: `npm pack` writes
      # `<scope>-<name>-<version>.tgz` based on `package.json`. Both
      # pkg-web and pkg-node share the same name
      # (`@atlas-trust/verify-wasm`), so the default filenames collide.
      # Disambiguate with `-web` / `-node` suffix before uploading to
      # the single GH Release. The npm-published tarballs themselves
      # are unaffected — npm publishes by package.json metadata, not
      # filename.
      - name: Upload tarballs to GitHub Release (V1.15 Welle B backup channel)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          # MED-5 (TOCTOU): pin the GH Release object to the commit SHA
          # that the verify-tag step authenticated. If `gh release create`
          # re-resolves `${TAG}` at upload time and an attacker has
          # force-pushed the tag onto a different commit between the
          # verify-tag step and this step, `--target ${VERIFIED_SHA}`
          # binds the release to the originally-verified commit, closing
          # the TOCTOU window. (`gh release upload` is asset-only and
          # does not re-resolve the tag, so it doesn't need --target.)
          VERIFIED_SHA: ${{ steps.verify-tag.outputs.verified_sha }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          # Defence-in-depth: assert VERIFIED_SHA is non-empty. If the
          # verify-tag step's output capture ever silently regresses
          # (e.g. someone refactors the workflow and drops the `id:`),
          # we want this step to fail closed rather than silently fall
          # back to the un-pinned create path.
          if [ -z "${VERIFIED_SHA:-}" ]; then
            echo "ERROR: VERIFIED_SHA empty — verify-tag step output missing." >&2
            echo "  This step requires the verify-tag step to expose verified_sha." >&2
            exit 1
          fi

          # Resolve the single tarball expected in each pkg-* dir.
          # Pipe-then-head silently masks `ls` failure (head exits 0)
          # and silently picks the first match if multiple tarballs
          # exist (e.g. workspace pollution from a prior workflow run).
          # Both modes would silently upload the wrong file, so use
          # an array + count assertion instead.
          shopt -s nullglob
          WEB_MATCHES=(crates/atlas-verify-wasm/pkg-web/*.tgz)
          NODE_MATCHES=(crates/atlas-verify-wasm/pkg-node/*.tgz)
          if [ "${#WEB_MATCHES[@]}" -ne 1 ]; then
            echo "ERROR: expected exactly 1 *.tgz in crates/atlas-verify-wasm/pkg-web/, found ${#WEB_MATCHES[@]}: ${WEB_MATCHES[*]:-<none>}" >&2
            exit 1
          fi
          if [ "${#NODE_MATCHES[@]}" -ne 1 ]; then
            echo "ERROR: expected exactly 1 *.tgz in crates/atlas-verify-wasm/pkg-node/, found ${#NODE_MATCHES[@]}: ${NODE_MATCHES[*]:-<none>}" >&2
            exit 1
          fi
          WEB_TGZ_SRC="${WEB_MATCHES[0]}"
          NODE_TGZ_SRC="${NODE_MATCHES[0]}"
          shopt -u nullglob

          WEB_BASENAME=$(basename "${WEB_TGZ_SRC}" .tgz)
          NODE_BASENAME=$(basename "${NODE_TGZ_SRC}" .tgz)
          WEB_TGZ="${WEB_BASENAME}-web.tgz"
          NODE_TGZ="${NODE_BASENAME}-node.tgz"
          cp "${WEB_TGZ_SRC}" "${WEB_TGZ}"
          cp "${NODE_TGZ_SRC}" "${NODE_TGZ}"

          # SHA256 manifest — auditor cross-references for in-flight
          # tamper detection on the GH-Release download path. Format
          # is `<sha256>  <filename>` per line, parseable by
          # `sha256sum --check`. Note: this manifest is *not* the
          # origin-integrity root — that is the npm-side OIDC-signed
          # SLSA L3 provenance, which the operator cross-verifies via
          # `npm view … dist.integrity` (SHA512 base64) per
          # OPERATOR-RUNBOOK §12 step 3.
          sha256sum "${WEB_TGZ}" "${NODE_TGZ}" > tarball-sha256.txt
          cat tarball-sha256.txt

          # Two paths: the release for this tag may already exist
          # (e.g. created via the GitHub UI as part of release notes
          # drafting) or may not (e.g. `git push origin v1.15.0`
          # without UI follow-up). `gh release upload --clobber`
          # requires the release to exist; `gh release create` creates
          # it. Try-then-fallback keeps both flows green.
          #
          # `--clobber` on the upload path lets the workflow re-run on
          # the same tag if a prior attempt failed before reaching this
          # step (e.g. an npm-side flake during the publish).
          #
          # Release notes use an absolute URL for the OPERATOR-RUNBOOK
          # link — relative paths in release-notes Markdown do NOT
          # resolve against the repo tree (unlike README/wiki Markdown),
          # so a relative `(docs/…)` link would render as a dead link
          # in the rendered release page.
          NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/blob/${TAG}/docs/OPERATOR-RUNBOOK.md"
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" > /dev/null 2>&1; then
            echo "Release ${TAG} exists — uploading assets to it."
            gh release upload "${TAG}" \
              "${WEB_TGZ}" "${NODE_TGZ}" tarball-sha256.txt \
              --clobber \
              --repo "${GITHUB_REPOSITORY}"
          else
            echo "Release ${TAG} does not exist — creating with assets pinned to ${VERIFIED_SHA}."
            # --target pins the release-object's `target_commitish` to
            # the SHA verify-tag authenticated. Without this, `gh release
            # create` resolves the tag again at this point, opening a
            # TOCTOU window between verify-tag and release-create.
            gh release create "${TAG}" \
              "${WEB_TGZ}" "${NODE_TGZ}" tarball-sha256.txt \
              --title "${TAG}" \
              --target "${VERIFIED_SHA}" \
              --notes "Auto-generated release for ${TAG}. WASM verifier tarballs (web + node) plus a SHA256 manifest. See [OPERATOR-RUNBOOK §12](${NOTES_URL}) for the backup-channel installation flow." \
              --repo "${GITHUB_REPOSITORY}"
          fi

          echo "Attached to GitHub Release ${TAG}:"
          echo "  - ${WEB_TGZ}"
          echo "  - ${NODE_TGZ}"
          echo "  - tarball-sha256.txt"
