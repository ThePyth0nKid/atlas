# V1.12 Scope B2 — wave-3 sealed-signer end-to-end smoke lane.
#
# This workflow exercises the full V1.11 wave-3 path in CI:
#
#   SoftHSM2 + ATLAS_HSM_* trio + ATLAS_HSM_WORKSPACE_SIGNER=1
#   → atlas-signer (with --features hsm)
#   → CKM_EC_EDWARDS_KEY_PAIR_GEN per workspace
#   → CKM_EDDSA(Ed25519) signing inside the token
#   → atlas-mcp-server smoke writes 3 events + 2 anchors
#   → atlas-verify-cli verifies the exported trace as VALID
#
# Complements the byte-equivalence lane (hsm-byte-equivalence.yml). That
# lane proves the V1.9 HKDF→SoftHSM2 import is byte-identical to the
# host-side derivation; this lane proves the wave-3 sealed signer
# produces traces that the verifier accepts end-to-end.
#
# Why a separate workflow file (rather than a job in
# hsm-byte-equivalence.yml): the smoke lane has a different paths
# filter (it fires on TS changes too) and runs the full TS toolchain
# (pnpm install + build + smoke). Combining them would either over-
# trigger the byte-equivalence run on TS-only PRs or under-trigger
# the smoke on signer-only PRs. Separate files keep each lane's
# trigger surface minimal.
#
# The PIN-fallback pattern, SHA pinning, paths filter, and
# permissions block all mirror hsm-byte-equivalence.yml — see that
# file's header for the rationale (V1.12 Scope B1).

name: hsm-wave3-smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'crates/atlas-signer/**'
      - 'crates/atlas-trust-core/**'
      - 'crates/atlas-verify-cli/**'
      - 'apps/atlas-mcp-server/**'
      - 'packages/atlas-bridge/**'
      - 'packages/atlas-cypher-validator/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/hsm-wave3-smoke.yml'
  push:
    branches:
      - master
      - main
    paths:
      - 'crates/atlas-signer/**'
      - 'crates/atlas-trust-core/**'
      - 'crates/atlas-verify-cli/**'
      - 'apps/atlas-mcp-server/**'
      - 'packages/atlas-bridge/**'
      - 'packages/atlas-cypher-validator/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/hsm-wave3-smoke.yml'

permissions:
  contents: read

jobs:
  wave3-smoke:
    runs-on: ubuntu-latest
    env:
      SOFTHSM2_TOKEN_LABEL: atlas-wave3-smoke-ci
      SOFTHSM2_PIN: ${{ secrets.SOFTHSM2_PIN || '1234' }}
      SOFTHSM2_SO_PIN: ${{ secrets.SOFTHSM2_SO_PIN || '0000' }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install SoftHSM2 + opensc
        run: |
          sudo apt-get update
          sudo apt-get install -y softhsm2 opensc

      - name: Initialise throwaway SoftHSM2 token
        run: |
          # Belt-and-suspenders: explicitly disable shell trace so a
          # future edit accidentally adding `set -x` (or a CI debug
          # toggle that flips `RUNNER_DEBUG=1`) doesn't echo the PIN
          # into the run log. GitHub Actions auto-masks values sourced
          # from `secrets.*`, but the fallback literal ('1234') is NOT
          # masked, so the explicit `set +x` is the load-bearing guard
          # for the fork-PR case. (Mirrors the rationale in
          # hsm-byte-equivalence.yml — kept inline here so a future
          # editor cannot remove `set +x` without seeing the why.)
          #
          # Orthogonal exposure (NOT addressed by `set +x`):
          # `softhsm2-util --init-token --pin "${SOFTHSM2_PIN}" --so-pin
          # "${SOFTHSM2_SO_PIN}"` below puts the PIN onto the process
          # argv list, readable via `/proc/<pid>/cmdline` for the
          # entire lifetime of the invocation; the window closes only
          # when the one-shot process exits (structural bound, not
          # time-based). See OPERATOR-RUNBOOK §2 for the production
          # PIN-argv discussion (production deploys MUST use
          # ATLAS_HSM_PIN_FILE, never argv). Acceptable here:
          # single-tenant runner, throwaway literal PIN, exposure ends
          # with the one-shot process exit. Removing `set +x` does NOT
          # close this orthogonal hole — both defences are needed.
          set +x
          mkdir -p "${RUNNER_TEMP}/softhsm-tokens"
          cat > "${RUNNER_TEMP}/softhsm2.conf" <<EOF
          directories.tokendir = ${RUNNER_TEMP}/softhsm-tokens
          objectstore.backend = file
          log.level = INFO
          slots.removable = false
          EOF
          export SOFTHSM2_CONF="${RUNNER_TEMP}/softhsm2.conf"
          softhsm2-util --init-token --free \
            --label "${SOFTHSM2_TOKEN_LABEL}" \
            --pin "${SOFTHSM2_PIN}" \
            --so-pin "${SOFTHSM2_SO_PIN}"
          # SoftHSM2 pads the Label field with trailing whitespace to a
          # fixed column width, so the prior `Label:[[:space:]]+...$`
          # regex stopped matching once the runner image picked up a
          # SoftHSM2 build that emits the padding (regression observed
          # on master 2026-05-04). The label is also passed via `awk -v`
          # rather than shell-interpolated into the awk script, so a
          # future label string containing awk-special characters
          # cannot break the parser. Match shape: capture the slot id
          # from `^Slot N` headers; on any line containing `Label:`,
          # strip the leading `…Label:<spaces>` prefix + trailing
          # whitespace, then exact-compare to the configured label.
          SLOT_ID=$(softhsm2-util --show-slots \
            | awk -v label="${SOFTHSM2_TOKEN_LABEL}" '
                /^Slot [0-9]+/ { slot = $2 }
                /Label:[[:space:]]+/ {
                  line = $0
                  sub(/^[[:space:]]*Label:[[:space:]]+/, "", line)
                  sub(/[[:space:]]+$/, "", line)
                  if (line == label) { print slot; exit }
                }')
          if [ -z "${SLOT_ID}" ]; then
            echo "FATAL: could not resolve slot id for token ${SOFTHSM2_TOKEN_LABEL}"
            softhsm2-util --show-slots
            exit 1
          fi
          # Defence-in-depth: require SLOT_ID to be a short string of
          # decimal digits before exporting it via $GITHUB_ENV. Without
          # this check, a tampered `softhsm2-util` binary could emit a
          # Slot header line containing a literal newline in the second
          # whitespace-delimited field, which awk's `$2` would faithfully
          # capture and `>> "$GITHUB_ENV"` would write as two lines —
          # injecting an arbitrary key=value pair into the step
          # environment for every subsequent step. The `{1,10}` magnitude
          # bound rejects pathologically long all-digit strings before
          # they reach the env file (PKCS#11 slot ids are 32-bit
          # unsigned per CK_SLOT_ID; max is 4294967295, exactly 10
          # digits). Bash `[[ =~ ]]` is available in GitHub Actions'
          # default shell on Linux runners.
          if ! [[ "${SLOT_ID}" =~ ^[0-9]{1,10}$ ]]; then
            echo "FATAL: SLOT_ID failed digit/length validation"
            softhsm2-util --show-slots
            exit 1
          fi
          PIN_FILE="${RUNNER_TEMP}/atlas-hsm.pin"
          printf '%s' "${SOFTHSM2_PIN}" > "${PIN_FILE}"
          chmod 0400 "${PIN_FILE}"
          # Export the trio + the wave-3 opt-in for every subsequent
          # step. The smoke.ts auto-detects all four and switches off
          # the dev-seed default when they are all present.
          {
            echo "SOFTHSM2_CONF=${RUNNER_TEMP}/softhsm2.conf"
            echo "ATLAS_HSM_PKCS11_LIB=/usr/lib/softhsm/libsofthsm2.so"
            echo "ATLAS_HSM_SLOT=${SLOT_ID}"
            echo "ATLAS_HSM_PIN_FILE=${PIN_FILE}"
            echo "ATLAS_HSM_WORKSPACE_SIGNER=1"
          } >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-03

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014 # v2.7.5
        with:
          workspaces: . -> target

      - name: Install pnpm
        # Version is resolved from the root `package.json`'s
        # `packageManager: pnpm@x.y.z` field (Corepack convention).
        # Specifying `with.version` here in addition would conflict
        # — `pnpm/action-setup` v4 explicitly errors out with
        # ERR_PNPM_BAD_PM_VERSION when both are set, to prevent the
        # silent split between dev-machine resolution (Corepack reads
        # packageManager) and CI resolution (overridden version).
        # Keep packageManager as the single source of truth.
        uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0

      - name: Install Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Build atlas-signer (release, --features hsm)
        # The HSM-feature build is the load-bearing artefact for this
        # lane. Release mode mirrors the production deployment shape
        # and exercises the same compiler optimisations the signer
        # ships with. ATLAS_SIGNER_PATH (set in the next step) points
        # the TS smoke at this binary explicitly so smoke.ts cannot
        # silently fall back to a non-HSM build.
        run: cargo build --release -p atlas-signer --features hsm

      - name: Build atlas-verify-cli (release)
        # The verifier is a default-features build — it does NOT need
        # the hsm feature because verification is purely public-key
        # math. Mirroring the production verifier shape.
        run: cargo build --release -p atlas-verify-cli

      - name: Pin atlas-signer path for the TS smoke
        # Without this, smoke.ts's resolveSignerBinary() walks
        # target/release first; in CI that exists with the right
        # binary, but pinning the path here makes the wave-3 contract
        # explicit and survives a future change to the binary search
        # order.
        run: echo "ATLAS_SIGNER_PATH=$GITHUB_WORKSPACE/target/release/atlas-signer" >> "$GITHUB_ENV"

      - name: Install workspace dependencies (bridge + MCP-server)
        # V1.19 Welle 2: install at the workspace root so pnpm wires
        # `@atlas/bridge: workspace:*` for the MCP-server consumer.
        # Installing only inside `apps/atlas-mcp-server` would still
        # symlink the workspace package, but the bridge's `dist/`
        # (which `package.json` `exports` points to) wouldn't exist
        # yet, and `tsc -p tsconfig.json` would fail with TS2307
        # "Cannot find module '@atlas/bridge'".
        run: pnpm install --frozen-lockfile

      - name: Build @atlas/bridge (TypeScript)
        # V1.19 Welle 2: bridge must be built BEFORE the MCP-server
        # build because the MCP-server's `tsc` resolves `@atlas/bridge`
        # via the package's `exports` field (`./dist/index.js`,
        # `./dist/index.d.ts`). The bridge has no source-condition
        # export today (deliberately — keeps the source/dist boundary
        # explicit so smoke tests exercise the shipped artefact). This
        # step is the single point of order-dependence in the lane.
        run: pnpm --filter @atlas/bridge build

      - name: Build @atlas/cypher-validator
        # V2-Beta Welle 15 hotfix: @atlas/cypher-validator emits dist/
        # via tsc, matching @atlas/bridge convention. The MCP-server's
        # query-graph tool imports from `@atlas/cypher-validator`,
        # which the consumer `tsc` resolves through main/types/exports
        # → ./dist/*.js. Without this step the MCP-server build fails
        # with TS2307 "Cannot find module '@atlas/cypher-validator'".
        run: pnpm --filter @atlas/cypher-validator build

      - name: Build MCP-server (TypeScript)
        run: pnpm build
        working-directory: apps/atlas-mcp-server

      - name: Run smoke against wave-3 sealed signer
        # The smoke.ts auto-detect block (V1.12 Scope B2) recognises
        # the HSM trio + ATLAS_HSM_WORKSPACE_SIGNER=1 and skips the
        # dev-seed override. Expected stdout includes the line
        # `[smoke] smoke-mode wave-3 sealed (...)`. If smoke.ts ever
        # regresses to unconditionally setting ATLAS_DEV_MASTER_SEED,
        # the signer dispatcher's three-layer ordering will pick
        # wave-3 anyway (HSM trio + opt-in wins over dev seed) — but
        # the log line is the canonical signal that the auto-detect
        # is still wired correctly.
        run: pnpm smoke
        working-directory: apps/atlas-mcp-server
