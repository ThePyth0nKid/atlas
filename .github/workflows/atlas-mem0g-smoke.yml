# Atlas V2-β Welle 18b — Mem0g Layer-3 cache smoke + benchmark capture.
#
# Runs the always-on tests (embedding determinism + secure-delete
# correctness) and the bench tests (B4/B5/B6 per ADR-Atlas-012 §4
# sub-decision #8). Bench output captured as artifact.
#
# Conventions per Atlas Standing Protocol (mirrors
# `.github/workflows/atlas-arcadedb-smoke.yml`):
#   - SHA-pinned actions
#   - `permissions: { contents: read }` (narrowest blast radius)
#   - paths-gated trigger (limits CI fan-out)
#   - cancel-in-progress concurrency
#   - Linux `ubuntu-latest` (lancedb-backend depends on Arrow / DataFusion
#     stack; cross-platform determinism test V2 in spike §12 expands to
#     Windows + macOS in a follow-on)
#   - 10 min timeout (similar to arcadedb-smoke; bench is the dominant cost)
#   - Model cache shared across runs via actions/cache (saves ~130 MB
#     download per workflow run after first cache hit)

name: atlas-mem0g-smoke

on:
  pull_request:
    branches:
      - master
      - main
    paths:
      - 'crates/atlas-mem0g/**'
      - 'crates/atlas-projector/src/upsert.rs'
      - 'crates/atlas-projector/src/state.rs'
      - 'crates/atlas-projector/src/canonical.rs'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/atlas-mem0g-smoke.yml'
  push:
    branches:
      - master
      - main
    paths:
      - 'crates/atlas-mem0g/**'
      - 'crates/atlas-projector/src/upsert.rs'
      - 'crates/atlas-projector/src/state.rs'
      - 'crates/atlas-projector/src/canonical.rs'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/atlas-mem0g-smoke.yml'

permissions:
  contents: read

concurrency:
  group: atlas-mem0g-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mem0g-smoke:
    name: mem0g-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Spike §12 V2 determinism gate: explicitly enable so the test runs.
      ATLAS_MEM0G_DETERMINISM_ENABLED: "1"
      # ADR §4 sub-decision #8 bench gate.
      ATLAS_MEM0G_BENCH_ENABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        # SHA-pinned branch-tip per Atlas convention (see
        # atlas-arcadedb-smoke.yml header note on dtolnay/rust-toolchain).
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-03

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014 # v2.7.5
        with:
          workspaces: . -> target

      - name: Cache fastembed model file
        # Saves the ~130 MB BAAI/bge-small-en-v1.5 ONNX model file
        # across runs (spike §8 step 2). First run downloads it (with
        # Atlas-controlled SHA verification per ADR §4 sub-decision #2);
        # subsequent runs hit the cache. Cache key is bound to the
        # ONNX_SHA256 constant in Cargo source so a model rotation
        # invalidates the cache automatically.
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.cache/atlas-mem0g
          # Cache key includes a digest of the embedder.rs file so any
          # ONNX_SHA256 / MODEL_URL change invalidates the cache.
          key: atlas-mem0g-model-${{ hashFiles('crates/atlas-mem0g/src/embedder.rs') }}

      - name: Build atlas-mem0g (default features)
        # Always-on build sanity. Default features (= no lancedb) is the
        # contract that downstream consumers (the W12 Read-API +
        # atlas-projector dispatch arm) compile against without paying
        # the LanceDB build cost.
        run: cargo check -p atlas-mem0g

      - name: Verify byte-pin reproduces post-W18b
        # Hard go/no-go per Atlas Standing Protocol. The W18b additions
        # (embedding_erasures field + canonicalisation extension)
        # MUST preserve the V2-α byte-pin
        # 8962c1681a44f9569f78c5917f568c5a027ac69f727f23ba5e8f871e5e013ac4.
        run: cargo test -p atlas-projector --test backend_trait_conformance byte_pin -- --quiet

      - name: Run always-on tests (lancedb-backend OFF)
        # The trait surface + secure-delete primitive + PerTableLockMap
        # are exercised here without paying the LanceDB build cost.
        # ~17 unit tests + 4 secure-delete tests + 1 determinism
        # sentinel.
        run: cargo test -p atlas-mem0g -- --nocapture

      - name: Run bench capture (lancedb-backend OFF — placeholder mode)
        # With the feature OFF, the bench tests print "skipping" lines
        # documenting that the lancedb body stubs are not exercised at
        # CI time pending the V1-V4 verification phase. Output still
        # uploaded as artifact for operator inspection.
        run: |
          set -o pipefail
          mkdir -p target
          cargo test -p atlas-mem0g --test mem0g_benchmark -- --ignored --nocapture \
            2>&1 | tee target/mem0g-bench.log

      - name: Upload benchmark log artifact
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: mem0g-bench-log
          path: target/mem0g-bench.log
          if-no-files-found: warn
          retention-days: 30
