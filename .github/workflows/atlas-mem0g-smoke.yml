# Atlas V2-β Welle 18b/c — Mem0g Layer-3 cache smoke + benchmark capture.
#
# Runs the always-on tests (embedding determinism + secure-delete
# correctness) and the bench tests (B4/B5/B6 per ADR-Atlas-012 §4
# sub-decision #8). Bench output captured as artifact.
#
# W18c Phase C — V1-V4 cross-platform CI matrix expansion:
#   - V1: LanceDB cleanup_old_versions Windows behaviour test
#         (Windows-only via #[cfg(target_os = "windows")] gate)
#   - V2: fastembed-rs determinism — 2-run byte-equality assertion
#         on Linux + Windows + macOS (via the matrix below)
#   - V4: fastembed-rs model file size measurement after first-load
#         (~130 MB ± 10%, captured in CI log per OS leg)
#   - V3: deferred-by-decision — `lancedb = "0.29"` is the latest
#         available crate (cargo info confirmed 2026-05-15); no 0.30+
#         exists yet, so the `_deletion_files` semantics-change
#         spike has nothing to compare against. When LanceDB 0.30+
#         lands upstream, a follow-on welle adds the spike test
#         BEFORE bumping the dependency. See plan-doc Phase C
#         Implementation Notes.
#
# Conventions per Atlas Standing Protocol (mirrors
# `.github/workflows/atlas-arcadedb-smoke.yml`):
#   - SHA-pinned actions
#   - `permissions: { contents: read }` (narrowest blast radius)
#   - paths-gated trigger (limits CI fan-out)
#   - cancel-in-progress concurrency
#   - 3-OS matrix: ubuntu-latest + windows-latest + macos-latest
#     (W18c Phase C; was Linux-only in W18b)
#   - 15 min timeout per leg (cross-OS HF download + Windows runner
#     baseline are slower than the 10 min Linux-only baseline)
#   - Per-OS model cache via actions/cache (~130 MB BAAI/bge-small-en-v1.5;
#     cache-key invalidates automatically on embedder.rs source change)

name: atlas-mem0g-smoke

on:
  pull_request:
    branches:
      - master
      - main
    paths:
      - 'crates/atlas-mem0g/**'
      - 'crates/atlas-projector/src/upsert.rs'
      - 'crates/atlas-projector/src/state.rs'
      - 'crates/atlas-projector/src/canonical.rs'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/atlas-mem0g-smoke.yml'
  push:
    branches:
      - master
      - main
    paths:
      - 'crates/atlas-mem0g/**'
      - 'crates/atlas-projector/src/upsert.rs'
      - 'crates/atlas-projector/src/state.rs'
      - 'crates/atlas-projector/src/canonical.rs'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/atlas-mem0g-smoke.yml'

permissions:
  contents: read

concurrency:
  group: atlas-mem0g-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mem0g-smoke:
    name: mem0g-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # PR #107 fix-commit-4: bumped 15 → 25 min. Empirically:
    #   - ubuntu-latest: 7m16s end-to-end (well under 15)
    #   - macos-latest: 12m28s end-to-end (knapp drin under 15)
    #   - windows-latest: ~14 min compile + tests + needed extra ~3 min
    #     for tar+zstd post-job cache-save of the larger Windows
    #     target/ directory; got cut off at 15 min job-timeout during
    #     cache-save, leaving the cache empty and creating a
    #     perpetual cache-miss loop for future runs.
    # 25 min gives Windows comfortable buffer for first-run cache
    # populate; subsequent runs hit cache and finish faster on all OS.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # W18c Phase C — V1 (Windows path semantics) + V2 (cross-OS
        # determinism) require all three OS in matrix. fail-fast: false
        # so a Windows-only V2 failure does not block visibility into
        # Linux + macOS results (informs the R-W18c-C1 fallback
        # decision).
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      # Spike §12 V2 determinism gate (in-process, fast — runs without
      # HF download).
      ATLAS_MEM0G_DETERMINISM_ENABLED: "1"
      # W18c Phase C: full HF download + 2-run byte-equality smoke
      # (V2) + model size measurement (V4). ~130 MB download budget
      # per leg (cached after first run via actions/cache below).
      ATLAS_MEM0G_EMBED_SMOKE_ENABLED: "1"
      # ADR §4 sub-decision #8 bench gate.
      ATLAS_MEM0G_BENCH_ENABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        # SHA-pinned branch-tip per Atlas convention (see
        # atlas-arcadedb-smoke.yml header note on dtolnay/rust-toolchain).
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-03

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014 # v2.7.5
        with:
          # W18c Phase C: per-OS workspace key so Linux + Windows +
          # macOS target/ caches do not clobber each other.
          workspaces: . -> target
          key: ${{ matrix.os }}

      - name: Resolve model cache path (per OS)
        id: model-cache-path
        # W18c Phase C: ~/.cache/atlas-mem0g resolves to different
        # absolute paths per OS (Linux: $HOME/.cache, macOS: same,
        # Windows: %USERPROFILE%\.cache). actions/cache wants the
        # explicit path, so we resolve once and emit it. Default arm
        # fails loudly on unrecognized runner — silently emitting an
        # empty path would cause actions/cache to cache the entire
        # runner root (PR #107 reviewer cross-cutting observation).
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest|macos-latest)
              echo "path=$HOME/.cache/atlas-mem0g" >> "$GITHUB_OUTPUT"
              ;;
            windows-latest)
              echo "path=$USERPROFILE/.cache/atlas-mem0g" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unrecognized matrix.os '${{ matrix.os }}' — refusing to emit empty model-cache-path (would cause actions/cache to cache the runner root)"
              exit 1
              ;;
          esac

      - name: Cache fastembed model files
        # Saves the ~130 MB BAAI/bge-small-en-v1.5 ONNX file PLUS the
        # four tokenizer support files across runs (W18c Phase B
        # extended the pin set to 5 files; spike §8 step 2). First
        # run downloads them (with Atlas-controlled SHA-256
        # verification per ADR §4 sub-decision #2); subsequent runs
        # hit the cache. Cache key is bound to the embedder.rs source
        # file digest so any pin rotation invalidates the cache
        # automatically.
        #
        # Per-OS cache key: model bytes are byte-identical across
        # OS (HuggingFace is content-addressed; SHA-256 verified by
        # Atlas), but the OS-specific cache path differs and
        # actions/cache scopes by OS implicitly via the key prefix.
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ${{ steps.model-cache-path.outputs.path }}
          key: atlas-mem0g-model-${{ matrix.os }}-${{ hashFiles('crates/atlas-mem0g/src/embedder.rs') }}

      - name: Install protoc (per OS)
        # Required by `lance-encoding v6.0.0`'s `prost-build` build
        # script when the V1-V4 step compiles atlas-mem0g with
        # `--features lancedb-backend`. Without this step, the
        # feature-on cargo build fails closed with `Could not find
        # protoc` on all 3 OS legs (PR #107 fix-commit-2). The default-
        # features `cargo check` below does NOT need protoc (lance is
        # feature-gated off), so installing here in advance is the
        # cleanest syntactic boundary.
        #
        # Per-OS package managers: apt on Ubuntu, brew on macOS,
        # choco on Windows (the only one not pre-installed on a
        # GitHub-hosted runner is the `protoc` binary itself; the
        # respective package managers are pre-installed). Default arm
        # fails loudly on unrecognized runner.
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)
              # `libprotobuf-dev` ships the well-known-types `.proto`
              # files (incl. google/protobuf/empty.proto) that
              # `lance-encoding`'s prost-build script imports. The
              # bare `protobuf-compiler` package on Noble (Ubuntu
              # 24.04) only ships the protoc binary without the
              # well-known types, causing `Import "google/protobuf/empty.proto"
              # was not found or had errors` (PR #107 fix-commit-3).
              # macOS `brew install protobuf` and Windows `choco install
              # protoc` both bundle the well-known types automatically.
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev
              ;;
            macos-latest)
              brew install protobuf
              ;;
            windows-latest)
              choco install protoc -y --no-progress --limit-output
              ;;
            *)
              echo "::error::Unrecognized matrix.os '${{ matrix.os }}' — refusing to skip protoc install"
              exit 1
              ;;
          esac
          protoc --version

      - name: Build atlas-mem0g (default features)
        # Always-on build sanity. Default features (= no lancedb) is the
        # contract that downstream consumers (the W12 Read-API +
        # atlas-projector dispatch arm) compile against without paying
        # the LanceDB build cost.
        run: cargo check -p atlas-mem0g

      - name: Verify byte-pin reproduces post-W18c
        # Hard go/no-go per Atlas Standing Protocol. The W18b additions
        # (embedding_erasures field + canonicalisation extension) AND
        # the W18c Phase B fastembed wiring AND the W18c Phase C V1-V4
        # additions MUST all preserve the V2-α byte-pin
        # 8962c1681a44f9569f78c5917f568c5a027ac69f727f23ba5e8f871e5e013ac4.
        run: cargo test -p atlas-projector --test backend_trait_conformance byte_pin -- --quiet

      - name: Run always-on tests (lancedb-backend OFF)
        # The trait surface + secure-delete primitive + PerTableLockMap
        # are exercised here without paying the LanceDB build cost.
        # ~17 unit tests + 4 secure-delete tests + 1 determinism
        # sentinel + V1/V2/V4 sentinels (Phase C).
        run: cargo test -p atlas-mem0g -- --nocapture

      - name: Run V1-V4 verification suite (lancedb-backend ON)
        # W18c Phase C: explicit V1-V4 verification gates. Runs
        # feature-on so the real fastembed wiring + LanceDB-stub
        # paths are exercised.
        #
        # V1 (lancedb_windows_behaviour): Windows-only via cfg gate;
        #     Linux + macOS legs report 1 sentinel test
        #     (windows_lance_behaviour_skipped_on_non_windows).
        # V2 (embedding_byte_equal_two_runs): all 3 OS via the
        #     ATLAS_MEM0G_EMBED_SMOKE_ENABLED gate. Cross-platform
        #     byte-equality assertion is the load-bearing claim.
        # V4 (fastembed_model_file_size_within_envelope): all 3 OS;
        #     prints the actual file size to stdout for artifact
        #     capture per leg.
        #
        # PR #107 reviewer HIGH-1 fix: ATLAS_MEM0G_MODEL_CACHE_DIR is
        # set to the actions/cache@v4-restored path so V2/V4 tests
        # share the cached ~130 MB model file across runs. Without
        # this env var, each test would call AtlasEmbedder::new with
        # a fresh tempdir and re-download the model on every CI run
        # (defeating the cache step's purpose; ~390 MB wasted per
        # 3-OS matrix run + 3× the HF supply-chain attack window).
        # The TOCTOU-free `read_and_verify` primitive still runs on
        # cache hits, so the supply-chain contract is preserved.
        #
        # Per the W18c plan-doc R-W18c-C1: cross-platform float
        # determinism is hard. If V2 fails on Windows, the operator
        # runbook §"Cross-platform fallback" documents the
        # event_uuid-only cache-key fallback. fail-fast: false at
        # the matrix level (above) means the failure does not mask
        # Linux + macOS PASS visibility.
        env:
          ATLAS_MEM0G_MODEL_CACHE_DIR: ${{ steps.model-cache-path.outputs.path }}
        shell: bash
        run: |
          set -o pipefail
          mkdir -p target
          # `--include-ignored` runs all tests including #[ignore]-gated
          # smokes (V2/V4). PR #107 reviewer MEDIUM-3 simplified from
          # the redundant `--ignored --include-ignored` pair.
          cargo test -p atlas-mem0g --features lancedb-backend \
            --test embedding_determinism \
            --test embedder_size_measurement \
            --test lancedb_windows_behaviour \
            -- --nocapture --include-ignored \
            2>&1 | tee target/mem0g-v1v4-${{ matrix.os }}.log

      - name: Run bench capture (lancedb-backend OFF — placeholder mode)
        # With the feature OFF, the bench tests print "skipping" lines
        # documenting that the lancedb body stubs are not exercised at
        # CI time pending the Phase D body fill-in. Output still
        # uploaded as artifact for operator inspection.
        shell: bash
        run: |
          set -o pipefail
          mkdir -p target
          cargo test -p atlas-mem0g --test mem0g_benchmark -- --ignored --nocapture \
            2>&1 | tee target/mem0g-bench-${{ matrix.os }}.log

      - name: Upload V1-V4 + benchmark logs
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: mem0g-logs-${{ matrix.os }}
          path: |
            target/mem0g-v1v4-${{ matrix.os }}.log
            target/mem0g-bench-${{ matrix.os }}.log
          if-no-files-found: warn
          retention-days: 30
