# V1.12 Scope B1 — SoftHSM2 byte-equivalence CI lane (PR-promoted).
#
# Runs the `hsm_byte_equivalence` integration test in
# `crates/atlas-signer/tests/` against a CI-provisioned SoftHSM2 token.
# The test answers a single question:
#
#   Does importing the V1.9 HKDF-derived 32-byte seed into SoftHSM2
#   yield the same Ed25519 pubkey as `ed25519_dalek::SigningKey::from_bytes`?
#
# If YES: V1.11 Scope A (HSM seal scope wave 3) can ship as a
# backwards-compatible seed-import migration — old workspace pubkeys
# survive the HSM-seal upgrade. (V1.11 confirmed: YES for the HKDF
# import path; wave-3 keypairs use CKM_EC_EDWARDS_KEY_PAIR_GEN with
# hardware entropy and are NOT byte-equivalent to V1.9 — that's why
# wave-3 is an explicit opt-in. See `.handoff/v1.11-handoff.md` §1.)
#
# This workflow does NOT replace the dev-seed CI lane — it adds an
# HSM-backed lane on top so the PKCS#11 path is exercised end-to-end
# in CI without needing a hardware token. The token is throwaway
# (created and destroyed inside the workflow); the PIN defaults to a
# literal constant for fork-PR compatibility (secrets are not exposed
# to fork workflows) but is overridable via `secrets.SOFTHSM2_PIN` for
# repo-internal PRs that want hardened CI hygiene.
#
# V1.12 Scope B1 promotion: trigger flipped from `workflow_dispatch`-only
# to `pull_request:` + `push:` (with paths-filter to only fire on HSM-
# relevant changes), all `uses:` pinned to immutable SHAs, and PIN
# literals moved behind a `${{ secrets.* || 'default' }}` fallback.

name: hsm-byte-equivalence

on:
  # Manual re-run is preserved for ad-hoc verification + debugging
  # (e.g. SoftHSM2 quirks surfacing on a non-HSM-touching PR).
  workflow_dispatch:
  # Pull-request and push triggers are gated by `paths:` so only HSM-
  # relevant changes pay the SoftHSM2 provisioning cost (~30-45s on
  # ubuntu-latest). Touching docs, TS, or non-signer crates does NOT
  # fire this lane. The wave-3 smoke lane (sibling workflow added in
  # V1.12 Scope B2) shares the same paths filter to keep CI cost
  # bounded.
  pull_request:
    paths:
      - 'crates/atlas-signer/**'
      - 'crates/atlas-trust-core/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/hsm-byte-equivalence.yml'
  push:
    branches:
      - master
      - main
    paths:
      - 'crates/atlas-signer/**'
      - 'crates/atlas-trust-core/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/hsm-byte-equivalence.yml'

# Minimum permission set: this workflow only reads source and writes
# nothing back to the repo. Explicit `read` declaration overrides any
# repo-default `write-all` token grant and shrinks the blast radius if
# a pinned action is later compromised at the SHA level (theoretical
# but documented in GitHub's threat model).
permissions:
  contents: read

jobs:
  byte-equivalence:
    runs-on: ubuntu-latest
    env:
      # Ephemeral CI-only token state. The SoftHSM2 token configured
      # here is created and destroyed inside this single runner job and
      # never touches a production secret.
      #
      # PIN handling: defaults to a literal so fork PRs (which have no
      # access to repository secrets) still run end-to-end. Repo-internal
      # PRs and pushes can override via `secrets.SOFTHSM2_PIN` to
      # exercise the secrets-injection path without changing workflow
      # shape — the test does not branch on PIN value, so both paths
      # yield identical assertions. Same pattern for SO-PIN.
      #
      # The literal default ('1234' / '0000') is intentionally well-known
      # so an auditor can reproduce the full byte-equivalence test
      # locally with `softhsm2-util --init-token --pin 1234 --so-pin 0000`
      # and a fresh tokendir, without needing repo secret access.
      SOFTHSM2_TOKEN_LABEL: atlas-byte-equiv-ci
      SOFTHSM2_PIN: ${{ secrets.SOFTHSM2_PIN || '1234' }}
      SOFTHSM2_SO_PIN: ${{ secrets.SOFTHSM2_SO_PIN || '0000' }}
      SOFTHSM2_SLOT_INDEX: '0'

    steps:
      # All `uses:` pinned to immutable SHAs (V1.12 Scope B1). Tag refs
      # like `@v4` and `@stable` are mutable and a compromised tag move
      # would let an attacker run arbitrary code on every PR (including
      # from forks). Bumping the SHAs requires a human-reviewed PR; the
      # comment after each pin records the resolved tag/branch at the
      # time of pinning so the upgrade path stays auditable.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install SoftHSM2 + opensc
        run: |
          sudo apt-get update
          sudo apt-get install -y softhsm2 opensc

      - name: Initialise throwaway SoftHSM2 token
        run: |
          # Belt-and-suspenders: explicitly disable shell trace so a
          # future edit accidentally adding `set -x` (or a CI debug
          # toggle that flips `RUNNER_DEBUG=1`) doesn't echo the PIN
          # into the run log. GitHub Actions auto-masks values sourced
          # from `secrets.*`, but the fallback literal ('1234') is NOT
          # masked, so the explicit `set +x` is the load-bearing guard
          # for the fork-PR case.
          #
          # Orthogonal exposure (NOT addressed by `set +x`):
          # `softhsm2-util --init-token --pin "${SOFTHSM2_PIN}" --so-pin
          # "${SOFTHSM2_SO_PIN}"` below puts the PIN onto the process
          # argv list. On Linux the PIN is readable via
          # `/proc/<pid>/cmdline` from any process with sufficient
          # permissions for the entire lifetime of the `softhsm2-util`
          # invocation; the window closes only when the process exits
          # (one-shot init per job — bound is structural, not
          # time-based). OPERATOR-RUNBOOK §2 covers the wider PIN-argv
          # discussion (production deploys MUST use the
          # ATLAS_HSM_PIN_FILE path, never argv). The residual risk is
          # accepted here because the runner is single-tenant, the PIN
          # is a throwaway literal scoped to this one job, and the
          # exposure ends with the one-shot process exit. Removing
          # `set +x` does NOT close this orthogonal hole — both
          # defences are needed independently.
          set +x
          # Use a per-workflow tokendir so two parallel runs of this
          # workflow do not race on /var/lib/softhsm. `softhsm2-util
          # --init-token --free` picks the first uninitialised slot,
          # which on a fresh install is slot 0 (numerically); the
          # actual slot id we need (a 32-bit integer assigned by
          # SoftHSM2 on init) is read out of `--show-slots` below
          # because SoftHSM2 deliberately randomises it to discourage
          # hardcoding.
          mkdir -p "${RUNNER_TEMP}/softhsm-tokens"
          cat > "${RUNNER_TEMP}/softhsm2.conf" <<EOF
          directories.tokendir = ${RUNNER_TEMP}/softhsm-tokens
          objectstore.backend = file
          log.level = INFO
          slots.removable = false
          EOF
          export SOFTHSM2_CONF="${RUNNER_TEMP}/softhsm2.conf"
          softhsm2-util --init-token --free \
            --label "${SOFTHSM2_TOKEN_LABEL}" \
            --pin "${SOFTHSM2_PIN}" \
            --so-pin "${SOFTHSM2_SO_PIN}"
          # Capture the assigned slot id for the test runtime env.
          # SoftHSM2 pads the Label field with trailing whitespace to a
          # fixed column width, so the prior `Label:[[:space:]]+...$`
          # regex stopped matching once the runner image picked up a
          # SoftHSM2 build that emits the padding (regression observed
          # on master 2026-05-04). The label is also passed via `awk -v`
          # rather than shell-interpolated into the awk script, so a
          # future label string containing awk-special characters
          # cannot break the parser. Match shape: capture the slot id
          # from `^Slot N` headers; on any line containing `Label:`,
          # strip the leading `…Label:<spaces>` prefix + trailing
          # whitespace, then exact-compare to the configured label.
          SLOT_ID=$(softhsm2-util --show-slots \
            | awk -v label="${SOFTHSM2_TOKEN_LABEL}" '
                /^Slot [0-9]+/ { slot = $2 }
                /Label:[[:space:]]+/ {
                  line = $0
                  sub(/^[[:space:]]*Label:[[:space:]]+/, "", line)
                  sub(/[[:space:]]+$/, "", line)
                  if (line == label) { print slot; exit }
                }')
          if [ -z "${SLOT_ID}" ]; then
            echo "FATAL: could not resolve slot id for token ${SOFTHSM2_TOKEN_LABEL}"
            softhsm2-util --show-slots
            exit 1
          fi
          # Defence-in-depth: require SLOT_ID to be a string of decimal
          # digits before exporting it via $GITHUB_ENV. Without this
          # check, a tampered `softhsm2-util` binary could emit a Slot
          # header line containing a literal newline in the second
          # whitespace-delimited field, which awk's `$2` would faithfully
          # capture and `>> "$GITHUB_ENV"` would write as two lines —
          # injecting an arbitrary key=value pair into the step
          # environment for every subsequent step. Bash `[[ =~ ]]` is
          # available in GitHub Actions' default shell on Linux runners.
          if ! [[ "${SLOT_ID}" =~ ^[0-9]+$ ]]; then
            echo "FATAL: SLOT_ID is not a non-negative integer: '${SLOT_ID}'"
            softhsm2-util --show-slots
            exit 1
          fi
          echo "SOFTHSM2_CONF=${RUNNER_TEMP}/softhsm2.conf" >> "$GITHUB_ENV"
          echo "ATLAS_HSM_PKCS11_LIB=/usr/lib/softhsm/libsofthsm2.so" >> "$GITHUB_ENV"
          echo "ATLAS_HSM_SLOT=${SLOT_ID}" >> "$GITHUB_ENV"
          PIN_FILE="${RUNNER_TEMP}/atlas-hsm.pin"
          printf '%s' "${SOFTHSM2_PIN}" > "${PIN_FILE}"
          chmod 0400 "${PIN_FILE}"
          echo "ATLAS_HSM_PIN_FILE=${PIN_FILE}" >> "$GITHUB_ENV"
          # The byte-equivalence test's runtime gate. Set to the literal
          # "1" the test expects; any other value (or unset) skips.
          echo "ATLAS_TEST_HSM_BYTE_EQUIV=1" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-03

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014 # v2.7.5
        with:
          workspaces: . -> target

      - name: cargo test (HSM byte-equivalence)
        # Single test binary, single test invocation — keeps the failure
        # diagnostic isolated from the rest of `cargo test`. The test
        # itself owns the SoftHSM2 import + extract + destroy cycle; CI
        # only provides the env. `--test hsm_byte_equivalence` selects
        # the integration-test file written for this purpose; the
        # `--features hsm` brings in cryptoki.
        #
        # `--test-threads=1` is mandatory: the binary contains two
        # tests that each call `Pkcs11::new` + `C_Initialize`. PKCS#11's
        # `C_Initialize` is process-global (per the v3.0 spec §5.4), and
        # SoftHSM2 returns `CKR_CRYPTOKI_ALREADY_INITIALIZED` if a second
        # thread races a fresh init while the first holds the cryptoki
        # session. Forcing serial test execution sidesteps the race
        # without pulling `serial_test` into dev-deps.
        run: cargo test -p atlas-signer --features hsm --test hsm_byte_equivalence -- --nocapture --test-threads=1

      - name: cargo test (HSM operational sanity)
        # Re-run with the runtime gate cleared to confirm the SKIP path
        # is exercised cleanly. Defends against a future change that
        # accidentally makes the HSM-dependent tests run unconditionally
        # on dev machines without SoftHSM2. Also pinned to a single
        # thread for parity with the load-bearing run above — even
        # though both tests SKIP in this configuration, keeping the
        # invocation identical means the SKIP-path coverage matches
        # the real-path execution shape.
        env:
          ATLAS_TEST_HSM_BYTE_EQUIV: ''
        run: cargo test -p atlas-signer --features hsm --test hsm_byte_equivalence -- --nocapture --test-threads=1
